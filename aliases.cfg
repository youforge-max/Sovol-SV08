# Friendly-named wrappers for the raw G-code macros that show up as
# buttons in Mainsail. The originals (G31, G34, M106, M107, M600) must
# keep their names -- the slicer and the power-loss-recovery scripts
# call them directly.
#
# Install: upload to ~/printer_data/config/aliases.cfg
#          add "[include aliases.cfg]" to printer.cfg
#          FIRMWARE_RESTART
# Then hide the raw-named macros: Mainsail -> Settings -> Macros ->
# switch mode "simple" to "extended" and build a group with only the
# macros you actually want on the dashboard.

[gcode_macro LEVEL_GANTRY]
description: Home + quad gantry level + park (was G34)
gcode:
    G34

[gcode_macro CHANGE_FILAMENT]
description: Pause for filament change (was M600)
gcode:
    M600

[gcode_macro CLEAR_RESUME_FLAG]
description: Clear power-loss-recovery state (was G31)
gcode:
    G31

[gcode_macro FANS_MAX]
description: Part cooling fans 100%
gcode:
    M106 S255

[gcode_macro FANS_OFF]
description: Part cooling fans off
gcode:
    M107
