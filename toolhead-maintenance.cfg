# A one-button "park for maintenance" macro. Sends the toolhead to the
# front-center of the bed at half the Z travel, so you can reach the
# nozzle, wipe the bed, or swap a fan without fighting the gantry.
#
# Coordinates are derived from the machine's own axis maxima at runtime
# (x_max/2, z_max/2), so this file is drop-in on any Klipper printer --
# SV08, SV08 Max, or anything else -- with no numbers to edit.
#
# Front vs back: on the SV08 the bed's Y=0 edge faces you, so "front"
# is Y at a small positive value (5 mm here to stay off the endstop),
# NOT Y_max. Y_max is the BACK of the machine. If yours is mirrored,
# swap y_front to (axis_maximum.y - 5).
#
# Install: upload to ~/printer_data/config/toolhead-maintenance.cfg
#          add "[include toolhead-maintenance.cfg]" to printer.cfg
#          FIRMWARE_RESTART
# It then appears as a TOOLHEAD_MAINTENANCE button in Mainsail's Macros.

[gcode_macro TOOLHEAD_MAINTENANCE]
description: Park toolhead front-center at mid-Z height for maintenance access
gcode:
    {% if printer.print_stats.state == "printing" %}
        { action_raise_error("TOOLHEAD_MAINTENANCE blocked: printer is printing") }
    {% endif %}
    {% set x_mid  = (printer.toolhead.axis_maximum.x / 2)|round(1) %}
    {% set y_front = 5 %}
    {% set z_mid  = (printer.toolhead.axis_maximum.z / 2)|round(1) %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G90
    G0 Z{z_mid} F1200
    G0 X{x_mid} Y{y_front} F6000
    M400
    M117 Toolhead maintenance position
